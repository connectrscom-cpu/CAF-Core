# Deploy from this folder so the image build sees the Next app (caf-review), not the monorepo root:
#   cd apps/review && fly deploy
# Using `fly deploy -c apps/review/fly.toml` from the repo root sends the wrong Docker context and breaks the build.

app = "caf-review"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
