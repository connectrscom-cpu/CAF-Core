# Media gateway + in-process renderer + video-assembly (carousel / mux / full-pipeline).
# Deploy from the repository root:
#   fly deploy -c fly.caf-renderer.toml
#
# Set secrets (Fly dashboard or `fly secrets set`):
#   CAF_TEMPLATE_API_URL          — e.g. https://caf-core.fly.dev (Core serves GET /api/templates/* from bundled .hbs)
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_ASSETS_BUCKET — if video-assembly uploads
#   MUX_BURN_ENCODE_CRF, MUX_BURN_ENCODE_PRESET — optional video tuning
#   VIDEO_ASSEMBLY_FETCH_TIMEOUT_MS, VIDEO_ASSEMBLY_FFMPEG_TIMEOUT_MS, VIDEO_ASSEMBLY_JOB_TIMEOUT_MS
#   RENDERER_SHUTDOWN_SECRET      — optional; matches renderer /reset auth

app = "caf-renderer"
primary_region = "ams"

[build]
  dockerfile = "services/media-gateway/Dockerfile"

[env]
  PORT = "8080"
  RENDERER_PORT = "3333"
  VIDEO_PORT = "3334"
  SPAWN_CHILDREN = "true"
  NODE_ENV = "production"
  # Reduce Chromium relaunch churn; relaunches correlate with Fly healthcheck flaps.
  RENDERERS_BEFORE_RESET = "200"
  # Puppeteer default 30s is too tight under shared CPUs / cold starts.
  PUPPETEER_LAUNCH_TIMEOUT_MS = "120000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "1m30s"
    interval = "15s"
    method = "GET"
    path = "/ready"
    timeout = "20s"

  [http_service.concurrency]
    hard_limit = 12
    soft_limit = 6
    type = "requests"

[[vm]]
  memory = "4gb"
  cpu_kind = "shared"
  cpus = 4
