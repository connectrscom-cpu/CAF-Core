# CAF Core API — deploy: fly deploy (app must be linked to caf-core)
# On boot, pending migrations/*.sql apply automatically (CAF_RUN_MIGRATIONS_ON_START, default on) so schema stays aligned with the image.
# Fly secrets: DATABASE_URL (required); RENDERER_BASE_URL + VIDEO_ASSEMBLY_BASE_URL → caf-renderer;
# Meta in-Core publish: CAF_PUBLISH_EXECUTOR=meta, META_GRAPH_API_VERSION=v25.0; secrets CAF_META_FB_PAGE_ACCESS_TOKEN + CAF_META_IG_PAGE_ACCESS_TOKEN (or legacy CAF_META_PAGE_ACCESS_TOKEN for both).
# Optional: CAF_META_ACCOUNT_SOURCE_MAP=CUISINA=SNS so CUISINA uses SNS's META_FB / META_IG rows (same FB Page + IG account).
# Optional: CAROUSEL_TEMPLATES_DIR (defaults to /app/carousel-templates in image — bundled .hbs).
# On caf-renderer set CAF_TEMPLATE_API_URL=https://caf-core.fly.dev so missing disk templates load from Core /api/templates/*.
# Optional: SUPABASE_* (uploads), HEYGEN_API_KEY, CAF_CORE_API_TOKEN, CAF_CORE_REQUIRE_AUTH.
# Processing vision (carousel/video insights pass): PROCESSING_VISION_PROVIDER=nvidia → Nemotron VL via NVIDIA NIM; set NVIDIA_NIM_API_KEY secret on Fly.
# Mimic carousel pixels: MIMIC_IMAGE_PROVIDER=dashscope (Alibaba Qwen edit); set DASHSCOPE_API_KEY secret on Fly. Keep MIMIC_IMAGE_NVIDIA_FALLBACK_OPENAI=0 so OpenAI is never used for background extract.
# Inputs XLSX (InstagramPostData): Apify/scraper columns like carousel_slide_urls_json / child_posts_json are normalized on import;
# evidence rows persist slide CDN URLs in payload_json; caf_core.evidence_media_assets records pending URLs for audit.
# Top-performer vision: set SUPABASE_* + leave CAF_TOP_PERFORMER_ARCHIVE_MEDIA on or auto so Core uploads slides to Supabase first,
# then OpenAI uses time-limited signed URLs (private buckets' public URLs often 403 → invalid_image_url).
# Top-performer carousel: optional CAF_INSTAGRAM_EMBED_HTTP_PROXY (HTTP CONNECT) for embed HTML fallback + archive CDN fetches when datacenter IPs get 403/login-wall.
# Editorial learning "live" on the API: EDITORIAL_ANALYSIS_CRON_ENABLED=1 (optional EDITORIAL_ANALYSIS_CRON_PROJECT_SLUGS=SNS, EDITORIAL_ANALYSIS_CRON_INTERVAL_MS, WINDOW_DAYS).
# Or run on a schedule: fly ssh console -C "node /app/dist/cli/run-editorial-analysis.js SNS" / GitHub Actions calling the same image command.
# Do not set MUX_* / VIDEO_ASSEMBLY_* timeouts on Core unless you wire them in code (those belong on caf-renderer).

app = "caf-core"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3847"
  HOST = "0.0.0.0"
  # Require Review login; brands scoped to the signed-in account (Connectrs owner, etc.).
  CAF_ACCOUNT_AUTH_ENFORCED = "1"
  CAF_ACCOUNT_SIGNUP_ENABLED = "1"
  CAF_PUBLIC_URL = "https://caf-core.fly.dev"
  MIMIC_IMAGE_PROVIDER = "bfl"
  MIMIC_IMAGE_BFL_MODEL = "flux-2-klein-4b"
  MIMIC_FULL_BLEED_COPY_REFERENCE_SCALE = "1"
  MIMIC_IMAGE_BFL_FALLBACK_DASHSCOPE = "0"
  # HTML/CSS overlay on clean background plates (template_bg). Per-project override in Runs → planning caps.
  MIMIC_CAROUSEL_TEXT_VIA_FLUX = "0"
  MIMIC_USE_PROJECT_BRAND_PALETTE = "0"
  MIMIC_USE_BRAND_IMAGE_STYLE_HINTS = "0"
  MIMIC_VISUAL_SIMILARITY_PCT = "70"
  MIMIC_IMAGE_DASHSCOPE_MODEL = "qwen-image-edit-max"
  DASHSCOPE_API_BASE = "https://dashscope-intl.aliyuncs.com/api/v1"
  MIMIC_IMAGE_NVIDIA_FALLBACK_OPENAI = "0"
  PROCESSING_VISION_PROVIDER = "nvidia"
  # Live LLM copy for jobs (placeholder echoes reference OCR verbatim — bad for mimic handles/copy).
  OPENAI_GENERATION_MODE = "live"
  # Agent inspection for ChatGPT / browser agents (agent-map, /api/agent/*). Non-secret feature flag.
  AGENT_INSPECTION_ENABLED = "true"
  # Post-render layout QA: auto-reprint + Review badges; never BLOCK jobs (publish-ready funnel).
  MIMIC_LAYOUT_QA_ENABLED = "true"
  MIMIC_LAYOUT_QA_MAX_REPRINT_ITERATIONS = "3"
  MIMIC_LAYOUT_QA_BLOCK_REVIEW_ON_FAIL = "0"
  MIMIC_LAYOUT_QA_BLOCK_ON_HARD_FAIL = "0"
  # Text reprint: Puppeteer compositor per slide (must exceed renderer RENDER_TIMEOUT_MS).
  CAROUSEL_RENDERER_SLIDE_TIMEOUT_MS = "150000"

[http_service]
  internal_port = 3847
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # POST /v1/runs/.../process runs the whole job loop in one request; default proxy idle limits can drop the connection while work continues or mid-render → jobs left RENDERING.
  [http_service.http_options]
    idle_timeout = 900

  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    path = "/readyz"
    timeout = "10s"

[[vm]]
  # Core API + embedded Review Next.js (standalone)
  memory = "1536mb"
  cpu_kind = "shared"
  cpus = 1